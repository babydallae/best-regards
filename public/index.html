<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Regards,</title>
  <meta name="description" content="연차·반차·이직 사유, 말할 수 있게 만들어드립니다.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Nanum+Pen+Script&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #F1EEE3;
      overflow-x: hidden;
    }

    /* Page system */
    .page {
      position: relative;
      width: 100%;
      max-width: 1366px;
      margin: 0 auto;
      display: none;
    }
    .page.active { display: block; }
    .page > .bg { width: 100%; display: block; }

    /* Language toggle */
    .lang-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      display: flex; gap: 4px;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
      border-radius: 100px; padding: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .lang-btn {
      padding: 6px 14px; border: none; border-radius: 100px;
      font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; background: transparent; color: #888; transition: all 0.2s;
    }
    .lang-btn.active { background: #222; color: #fff; }

    /* ===== LANDING ===== */
    .landing-text {
      position: absolute;
      top: 52%; left: 50%;
      transform: translate(-20%, -10%);
      text-align: center;
    }
    .landing-sub {
      font-size: clamp(12px, 1.3vw, 17px);
      color: #555; margin-bottom: 20px; line-height: 1.6;
    }
    .landing-cta {
      display: inline-block;
      padding: 10px 32px;
      border: 2px solid #222; border-radius: 4px;
      background: #fff; color: #222;
      font-family: inherit; font-size: clamp(12px, 1.2vw, 16px); font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      text-decoration: none;
    }
    .landing-cta:hover { background: #222; color: #fff; }

    /* ===== INPUT PAGE ===== */
    .input-title {
      position: absolute;
      top: 3%; left: 0; width: 100%;
      text-align: center;
      font-size: clamp(18px, 2.8vw, 36px);
      font-weight: 900; color: #222;
    }
    .input-subtitle {
      position: absolute;
      top: 11%; left: 0; width: 100%;
      text-align: center;
      font-size: clamp(10px, 1.1vw, 14px);
      color: #999;
    }

    .input-wrap {
      position: absolute;
      top: 22%; left: 20%; width: 60%; height: 64%;
      z-index: 10;
      display: flex; flex-direction: column;
    }
    .type-row {
      display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .type-pill {
      padding: 5px 14px; border: 2px solid rgba(0,0,0,0.12); border-radius: 100px;
      background: rgba(255,255,255,0.6);
      font-family: inherit; font-size: clamp(10px, 1.1vw, 14px); font-weight: 700;
      color: #666; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .type-pill:hover { border-color: #222; color: #222; }
    .type-pill.active { background: #222; border-color: #222; color: #fff; }

    .memo-textarea {
      flex: 1; width: 100%;
      background: transparent; border: none; outline: none; resize: none;
      font-family: 'Nanum Pen Script', cursive;
      font-size: clamp(20px, 2.4vw, 30px);
      line-height: 2; color: #2a2a2a;
      padding: 4px 8px; caret-color: #333;
    }
    .memo-textarea::placeholder { color: #c0b5a8; }

    .submit-float {
      position: absolute; bottom: 4%; left: 50%;
      transform: translateX(-50%); z-index: 10;
    }
    .submit-btn {
      padding: 10px 36px; border: 2px solid #222; border-radius: 4px;
      background: #222; color: #fff;
      font-family: inherit; font-size: clamp(12px, 1.2vw, 16px); font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .submit-btn:hover:not(:disabled) { background: #444; }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ===== RESULT PAGE ===== */
    .result-title {
      position: absolute;
      top: 3%; left: 0; width: 100%;
      text-align: center;
      font-size: clamp(16px, 2.4vw, 32px);
      font-weight: 900; color: #222;
    }

    .result-wrap {
      position: absolute;
      top: 15%; left: 22%; width: 52%; height: 72%;
      z-index: 10; overflow-y: auto; padding: 2% 3%;
    }
    .result-wrap::-webkit-scrollbar { width: 4px; }
    .result-wrap::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    .result-section { margin-bottom: 22px; }
    .result-label {
      font-weight: 900; font-size: clamp(11px, 1.1vw, 14px);
      color: #999; margin-bottom: 6px; letter-spacing: 0.5px;
    }
    .result-text {
      font-family: 'Nanum Pen Script', cursive;
      font-size: clamp(18px, 2vw, 26px);
      line-height: 1.9; color: #222; white-space: pre-wrap;
    }
    .copy-one {
      display: inline-block; margin-top: 6px;
      padding: 3px 12px; border: 1px solid #ccc; border-radius: 4px;
      background: rgba(255,255,255,0.7);
      font-family: 'Noto Sans KR', sans-serif; font-size: clamp(9px, 0.9vw, 12px);
      color: #888; cursor: pointer; transition: all 0.2s;
    }
    .copy-one:hover { border-color: #222; color: #222; }
    .copy-one.copied { background: #222; color: #fff; border-color: #222; }

    .result-actions {
      position: absolute; bottom: 3%; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 10;
    }
    .action-btn {
      padding: 8px 24px; border: 2px solid #222; border-radius: 4px;
      font-family: inherit; font-size: clamp(11px, 1.1vw, 14px); font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .action-btn.primary { background: #222; color: #fff; }
    .action-btn.secondary { background: rgba(255,255,255,0.8); color: #222; }
    .action-btn:hover { opacity: 0.85; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #222; color: white;
      padding: 12px 24px; border-radius: 8px;
      font-size: 14px; font-weight: 700; z-index: 200;
      transition: transform 0.3s ease;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .page.active { animation: fadeIn 0.35s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @media (max-width: 768px) {
      .input-wrap { top: 22%; left: 8%; width: 84%; height: 60%; }
      .result-wrap { top: 16%; left: 8%; width: 84%; height: 64%; }
      .landing-text { transform: translate(-50%, 0); left: 50%; top: 58%; }
    }
  </style>
</head>
<body>

  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="kr">한</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <!-- Landing KR -->
  <div class="page active" id="landing-kr">
    <img class="bg" src="/img/landing-kr-blank.png" alt="">
    <div class="landing-text">
      <div class="landing-sub">연차·반차·이직 사유, 말할 수 있게 만들어드립니다.</div>
      <button class="landing-cta" id="startKr">사유 만들기</button>
    </div>
  </div>

  <!-- Landing EN -->
  <div class="page" id="landing-en">
    <img class="bg" src="/img/landing-en-blank.png" alt="">
    <div class="landing-text">
      <div class="landing-sub">Leave &amp; resignation excuses — made presentable.</div>
      <button class="landing-cta" id="startEn">Polish my excuse</button>
    </div>
  </div>

  <!-- Input KR -->
  <div class="page" id="input-kr">
    <img class="bg" src="/img/input-kr-blank.png" alt="">
    <div class="input-title">상황을 기입해주세요.</div>
    <div class="input-subtitle">비밀은 지키겠습니다.</div>
    <div class="input-wrap">
      <div class="type-row" id="typePillsKr">
        <button class="type-pill active" data-type="연차">연차</button>
        <button class="type-pill" data-type="반차">반차</button>
        <button class="type-pill" data-type="이직">이직</button>
        <button class="type-pill" data-type="지각">지각</button>
        <button class="type-pill" data-type="조퇴">조퇴</button>
      </div>
      <textarea class="memo-textarea" id="inputKr" placeholder="예: 그냥 쉬고 싶어요..."></textarea>
    </div>
    <div class="submit-float">
      <button class="submit-btn" id="submitKr" disabled>사유 만들기</button>
    </div>
  </div>

  <!-- Input EN -->
  <div class="page" id="input-en">
    <img class="bg" src="/img/input-en-blank.png" alt="">
    <div class="input-title" style="font-family:'Special Elite',monospace;">Please share your situation.</div>
    <div class="input-subtitle" style="font-family:'Special Elite',monospace;">This will be confidential.</div>
    <div class="input-wrap">
      <div class="type-row" id="typePillsEn">
        <button class="type-pill active" data-type="연차">Leave</button>
        <button class="type-pill" data-type="반차">Half-day</button>
        <button class="type-pill" data-type="이직">Resign</button>
        <button class="type-pill" data-type="지각">Late</button>
        <button class="type-pill" data-type="조퇴">Early out</button>
      </div>
      <textarea class="memo-textarea" id="inputEn" placeholder="e.g. I just don't want to go in..."></textarea>
    </div>
    <div class="submit-float">
      <button class="submit-btn" id="submitEn" disabled>Polish my excuse</button>
    </div>
  </div>

  <!-- Result KR -->
  <div class="page" id="result-kr">
    <img class="bg" src="/img/result-kr-blank.png" alt="">
    <div class="result-title">아래와 같이 확인을 부탁드립니다.</div>
    <div class="result-wrap" id="resultKr"></div>
    <div class="result-actions">
      <button class="action-btn secondary" id="retryKr">다시 하기</button>
      <button class="action-btn primary" id="copyAllKr">전체 복사</button>
    </div>
  </div>

  <!-- Result EN -->
  <div class="page" id="result-en">
    <img class="bg" src="/img/result-en-blank.png" alt="">
    <div class="result-title" style="font-family:'Special Elite',monospace;">Please find below;</div>
    <div class="result-wrap" id="resultEn"></div>
    <div class="result-actions">
      <button class="action-btn secondary" id="retryEn">Try again</button>
      <button class="action-btn primary" id="copyAllEn">Copy all</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // =============================================
    // TEMPLATE ENGINE — 진짜 회사에서 쓸 수 있는 버전
    // =============================================
    // 원칙: 진짜 이유를 절대 노출하지 않는다.
    // "쉬고 싶다" → "개인 사유" (뻔하지만 실제로 가장 많이 씀)
    // 키워드에 따라 적절한 커버 사유를 선택

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function detectContext(input) {
      const checks = [
        { keys: ['병원','진료','검진','건강검진','수술'], ctx: 'hospital' },
        { keys: ['치과','교정','스케일링'], ctx: 'dental' },
        { keys: ['이사','입주','짐'], ctx: 'moving' },
        { keys: ['결혼','웨딩','예식'], ctx: 'wedding' },
        { keys: ['아이','아기','어린이집','유치원','등원','하원'], ctx: 'childcare' },
        { keys: ['가족','부모님','어머니','아버지','어머님','아버님'], ctx: 'family' },
        { keys: ['관공서','주민센터','구청','동사무소'], ctx: 'office' },
        { keys: ['은행','금융','대출','서류'], ctx: 'bank' },
        { keys: ['비자','여권','대사관'], ctx: 'visa' },
        { keys: ['지하철','버스','교통','사고','막혀','막힘'], ctx: 'traffic' },
        { keys: ['늦잠','알람','못 일어'], ctx: 'overslept' },
        { keys: ['머리','두통','어지러','속 안 좋','토할','구역'], ctx: 'headache' },
        { keys: ['열','감기','기침','콧물','목 아'], ctx: 'sick' },
        { keys: ['아파','아프','몸살','컨디션'], ctx: 'unwell' },
        { keys: ['연봉','돈','급여','처우'], ctx: 'salary' },
        { keys: ['성장','배울','한계','답답'], ctx: 'growth' },
        { keys: ['분위기','문화','상사','팀장','갈등'], ctx: 'culture' },
      ];
      for (const { keys, ctx } of checks) {
        if (keys.some(k => input.includes(k))) return ctx;
      }
      return 'default';
    }

    const gen = {
      연차: (ctx) => {
        const base = {
          hospital: {
            formal: '사전 예약된 병원 진료 건으로 연차를 신청드립니다. 부재 중 업무는 사전 정리 완료하였습니다.',
            normal: '병원 예약이 있어 연차 사용 예정입니다. 급한 건은 메신저로 연락 부탁드립니다.',
            casual: '병원 예약 건으로 연차 쓰겠습니다. 급한 건 연락주세요!',
          },
          dental: {
            formal: '치과 진료 예약 건으로 연차를 신청드립니다. 업무 인수인계는 완료하였습니다.',
            normal: '치과 진료가 있어 연차 사용합니다. 급한 건은 메신저 남겨주세요.',
            casual: '치과 가야 해서 연차 쓸게요. 급한 건 연락주세요!',
          },
          moving: {
            formal: '주거지 이전 관련 일정으로 연차를 신청드립니다. 부재 중 업무는 사전 정리 완료하였습니다.',
            normal: '이사 일정이 있어 연차 사용 예정입니다. 급한 건은 메신저로 부탁드립니다.',
            casual: '이사 건으로 연차 쓰겠습니다!',
          },
          wedding: {
            formal: '경조사 관련 일정으로 연차를 신청드립니다.',
            normal: '경조사 일정이 있어 연차 사용합니다.',
            casual: '경조사 건으로 연차 쓸게요!',
          },
          childcare: {
            formal: '자녀 관련 일정으로 연차를 신청드립니다. 부재 중 업무는 정리 완료하였습니다.',
            normal: '아이 관련 일정이 있어 연차 사용합니다. 급한 건 메신저 부탁드립니다.',
            casual: '아이 건으로 연차 쓸게요!',
          },
          family: {
            formal: '가정 사정으로 연차를 신청드립니다. 부재 중 업무는 사전 정리 완료하였습니다.',
            normal: '집안 일정이 있어 연차 사용 예정입니다. 급한 건 메신저로 부탁드립니다.',
            casual: '집안 일정으로 연차 쓰겠습니다. 급한 건 연락주세요!',
          },
          office: {
            formal: '관공서 방문 일정으로 연차를 신청드립니다. 해당 업무가 평일에만 처리 가능하여 양해 부탁드립니다.',
            normal: '관공서 처리할 일이 있어 연차 사용합니다.',
            casual: '관공서 갈 일이 있어서 연차 쓸게요!',
          },
          bank: {
            formal: '금융기관 방문 및 서류 처리를 위해 연차를 신청드립니다.',
            normal: '은행 업무가 있어 연차 사용 예정입니다.',
            casual: '은행 볼 일 있어서 연차 쓰겠습니다!',
          },
          visa: {
            formal: '비자 관련 행정 업무 처리를 위해 연차를 신청드립니다.',
            normal: '비자 관련 서류 처리 건으로 연차 사용합니다.',
            casual: '비자 처리 건으로 연차 쓸게요!',
          },
        };
        const generic = [
          {
            formal: '개인 사유로 연차를 신청드립니다. 부재 중 업무는 사전 정리 완료하였습니다. 검토 부탁드리겠습니다.',
            normal: '개인 일정으로 연차 사용 예정입니다. 급한 건은 메신저로 연락 부탁드립니다.',
            casual: '개인 사유로 연차 쓰겠습니다. 급한 건 연락주세요!',
          },
          {
            formal: '개인 사정으로 연차 사용을 요청드립니다. 당일 업무는 사전 조율 완료하였습니다.',
            normal: '개인 사정으로 연차 사용합니다. 급한 업무는 메신저로 남겨주세요.',
            casual: '내일 개인 사정으로 연차 쓸게요. 급한 건 연락주세요!',
          },
        ];
        return base[ctx] || pickRandom(generic);
      },

      반차: (ctx) => {
        const base = {
          hospital: {
            formal: '병원 진료 예약 건으로 오전(오후) 반차를 신청드립니다. 나머지 시간은 정상 근무하겠습니다.',
            normal: '병원 예약이 있어 반차 사용합니다. 이후 정상 근무 예정입니다.',
            casual: '병원 가야 해서 반차 쓸게요. 이후 정상 출근합니다!',
          },
          dental: {
            formal: '치과 진료 예약 건으로 반차를 신청드립니다.',
            normal: '치과 예약이 있어 반차 사용합니다.',
            casual: '치과 가야 해서 반차 쓸게요!',
          },
          bank: {
            formal: '금융기관 방문을 위해 오전 반차를 신청드립니다. 이후 정상 출근하겠습니다.',
            normal: '은행 업무가 있어 오전 반차 사용합니다.',
            casual: '은행 볼 일 있어서 오전 반차 쓸게요!',
          },
          office: {
            formal: '관공서 업무 처리를 위해 반차를 신청드립니다.',
            normal: '관공서 갈 일이 있어 반차 사용합니다.',
            casual: '관공서 다녀올게요, 반차 씁니다!',
          },
          childcare: {
            formal: '자녀 관련 긴급 일정으로 반차를 신청드립니다.',
            normal: '아이 관련 일정으로 반차 사용합니다.',
            casual: '아이 건으로 반차 쓸게요!',
          },
        };
        const generic = [
          {
            formal: '개인 사유로 오전(오후) 반차를 신청드립니다. 나머지 시간은 정상 근무하겠습니다.',
            normal: '개인 일정으로 반차 사용 예정입니다. 이후 정상 근무합니다.',
            casual: '개인 사정으로 반차 쓸게요. 나머지는 정상 근무합니다!',
          },
        ];
        return base[ctx] || pickRandom(generic);
      },

      이직: (ctx) => {
        const base = {

    function generateExcuse(type, rawInput) {
      const ctx = detectContext(rawInput);
      const result = gen[type](ctx);
      return result;
    }

    // =====================
    // APP
    // =====================
    let lang = 'kr';
    let selectedType = '연차';
    let currentResult = '';

    const pages = {};
    ['landing-kr','landing-en','input-kr','input-en','result-kr','result-en'].forEach(id => {
      pages[id] = document.getElementById(id);
    });
    function showPage(name) {
      Object.values(pages).forEach(p => p.classList.remove('active'));
      pages[name].classList.add('active');
    }

    // Lang toggle
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.lang-btn.active').classList.remove('active');
        btn.classList.add('active');
        lang = btn.dataset.lang;
        const active = document.querySelector('.page.active').id;
        const base = active.replace('-kr','').replace('-en','');
        showPage(base + '-' + lang);
      });
    });

    // Start
    document.getElementById('startKr').addEventListener('click', () => showPage('input-kr'));
    document.getElementById('startEn').addEventListener('click', () => showPage('input-en'));

    // Pills
    function setupPills(id) {
      document.getElementById(id).querySelectorAll('.type-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          pill.parentElement.querySelector('.active').classList.remove('active');
          pill.classList.add('active');
          selectedType = pill.dataset.type;
          const other = id === 'typePillsKr' ? 'typePillsEn' : 'typePillsKr';
          document.getElementById(other).querySelectorAll('.type-pill').forEach(p => {
            p.classList.toggle('active', p.dataset.type === selectedType);
          });
        });
      });
    }
    setupPills('typePillsKr');
    setupPills('typePillsEn');

    // Inputs
    const inputKr = document.getElementById('inputKr');
    const inputEn = document.getElementById('inputEn');
    const submitKr = document.getElementById('submitKr');
    const submitEn = document.getElementById('submitEn');
    inputKr.addEventListener('input', () => {
      submitKr.disabled = !inputKr.value.trim();
      inputEn.value = inputKr.value; submitEn.disabled = submitKr.disabled;
    });
    inputEn.addEventListener('input', () => {
      submitEn.disabled = !inputEn.value.trim();
      inputKr.value = inputEn.value; submitKr.disabled = submitEn.disabled;
    });

    // Submit
    function handleSubmit() {
      const situation = (lang === 'kr' ? inputKr : inputEn).value.trim();
      if (!situation) return;
      const result = generateExcuse(selectedType, situation);

      const labels = {
        formal: { kr: '🎩 격식체', en: '🎩 Formal' },
        normal: { kr: '😊 무난체', en: '😊 Standard' },
        casual: { kr: '😎 캐주얼체', en: '😎 Casual' },
      };

      currentResult = `${labels.formal[lang]}\n${result.formal}\n\n${labels.normal[lang]}\n${result.normal}\n\n${labels.casual[lang]}\n${result.casual}`;

      const html = ['formal','normal','casual'].map(tone => `
        <div class="result-section">
          <div class="result-label">${labels[tone][lang]}</div>
          <div class="result-text">${result[tone]}</div>
          <button class="copy-one" onclick="copyOne(this)">복사</button>
        </div>
      `).join('');

      document.getElementById('resultKr').innerHTML = html;
      document.getElementById('resultEn').innerHTML = html;
      showPage('result-' + lang);
    }

    submitKr.addEventListener('click', handleSubmit);
    submitEn.addEventListener('click', handleSubmit);
    [inputKr, inputEn].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) handleSubmit();
      });
    });

    // Copy
    window.copyOne = function(btn) {
      const text = btn.parentElement.querySelector('.result-text').textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ 복사됨'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
      });
    };
    document.getElementById('copyAllKr').addEventListener('click', () => {
      navigator.clipboard.writeText(currentResult).then(() => showToast('전체 복사 완료!'));
    });
    document.getElementById('copyAllEn').addEventListener('click', () => {
      navigator.clipboard.writeText(currentResult).then(() => showToast('Copied!'));
    });

    // Retry
    document.getElementById('retryKr').addEventListener('click', () => { resetInput(); showPage('input-kr'); });
    document.getElementById('retryEn').addEventListener('click', () => { resetInput(); showPage('input-en'); });
    function resetInput() {
      inputKr.value = ''; inputEn.value = '';
      submitKr.disabled = true; submitEn.disabled = true;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
